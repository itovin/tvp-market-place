spring:
  application:
    name: backend
  datasource:
    url: jdbc:mysql://localhost:3306/tvpmp
    username: root
    password: MyPassword!
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
  jwt:
    accessTokenSecret: ${JWT_ACCESS_SECRET}
    refreshTokenSecret: ${JWT_REFRESH_SECRET}
    accessTokenExpiration: 900 # 15 mins
    refreshTokenExpiration: 604800 # 7 days